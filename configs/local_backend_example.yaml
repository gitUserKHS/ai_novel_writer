
app_name: CoNarrative AutoNovel Studio
workspace:
  root: workspace
  database_path: workspace/conarrative.db
  exports_dir: workspace/exports
  runtime_settings_path: workspace/runtime_settings.json
backend:
  provider: openai_compatible
  base_url: http://127.0.0.1:8080/v1
  api_key: not-needed
  model: qwen-local
  timeout_seconds: 120
  temperature: 0.85
  critic_temperature: 0.2
  max_tokens: 1800
  extra_headers: {}
  role_models:
    planner: qwen-local
    writer: qwen-local
    consistency_critic: qwen-local
    creativity_critic: qwen-local
    revision: qwen-local
    extractor: qwen-local
  cache_responses: true
  cache_dir: workspace/cache
orchestration:
  recent_scene_memory: 3
  adaptive_outline: true
  auto_revision: true
  minimum_release_consistency: 0.72
  consistency_weight: 0.58
  creativity_weight: 0.27
  world_model_weight: 0.15
  max_summary_memory: 6
