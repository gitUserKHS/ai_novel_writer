app_name: CoNarrative AutoNovel Studio
workspace:
  root: workspace_quickstart_mock
  database_path: workspace_quickstart_mock/conarrative.db
  exports_dir: workspace_quickstart_mock/exports
  runtime_settings_path: workspace_quickstart_mock/runtime_settings.json
backend:
  provider: mock
  base_url: http://127.0.0.1:8080/v1
  api_key: not-needed
  model: mock-story-engine
  timeout_seconds: 60
  temperature: 0.9
  critic_temperature: 0.2
  max_tokens: 2048
  extra_headers: {}
  role_models: {}
  cache_responses: false
  cache_dir: workspace_quickstart_mock/cache
orchestration:
  recent_scene_memory: 3
  candidate_count: 3
  scene_min_words: 320
  scene_max_words: 680
  adaptive_outline: true
  auto_revision: true
  minimum_release_consistency: 0.72
  consistency_weight: 0.58
  creativity_weight: 0.27
  world_model_weight: 0.15
  max_summary_memory: 6
